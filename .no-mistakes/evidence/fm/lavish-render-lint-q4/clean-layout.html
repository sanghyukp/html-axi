<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lavish Layout Audit - Clean Fixture</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10131a;
        color: #f7f3ea;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      .shell {
        max-width: 420px;
        border: 1px solid #3c3326;
        border-radius: 24px;
        padding: 20px;
        background: #171b24;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .card {
        min-width: 0;
        border-radius: 16px;
        padding: 14px;
        background: #242a36;
      }

      .badge-row {
        display: flex;
        min-width: 0;
        gap: 8px;
      }

      .badge {
        min-width: 0;
        border-radius: 999px;
        padding: 8px 12px;
        background: #f4c95d;
        color: #1a1508;
        font: 700 13px ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>Clean nested badge grid</h1>
      <section class="card-grid" aria-label="status cards">
        <article class="card">
          <p>Status</p>
          <div class="badge-row">
            <span class="badge">DEPLOYMENT-PIPELINE-READY-1234567890</span>
          </div>
        </article>
        <article class="card">
          <p>Owner</p>
          <div class="badge-row">
            <span class="badge">PLATFORM</span>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
