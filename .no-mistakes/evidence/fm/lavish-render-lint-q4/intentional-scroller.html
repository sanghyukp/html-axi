<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lavish Layout Audit - Intentional Scroller Fixture</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10131a;
        color: #f7f3ea;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      .shell {
        max-width: 420px;
        border: 1px solid #3c3326;
        border-radius: 24px;
        padding: 20px;
        background: #171b24;
      }

      .scroller {
        overflow-x: auto;
        border-radius: 16px;
        border: 1px solid #3c3326;
      }

      table {
        min-width: 820px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 16px;
        border-bottom: 1px solid #303747;
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: #f4c95d;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>Intentional horizontal scroller</h1>
      <div class="scroller" aria-label="wide release table">
        <table>
          <thead>
            <tr><th>Release</th><th>Status</th><th>Owner</th><th>Region</th><th>Long Identifier</th></tr>
          </thead>
          <tbody>
            <tr><td>Lavish Q4</td><td>Ready</td><td>Platform</td><td>Global</td><td>SHIP-READY-INTENTIONAL-SCROLLER-1234567890</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
