<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Queued-prompt pills</div>
      <div style="display: flex; flex-wrap: wrap; gap: 6px; max-width: 560px">
        <div
          style="
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #3c4557;
            border-radius: 999px;
            background: #1c212b;
            color: #d8deea;
            padding: 5px 7px 5px 11px;
            font-size: 12px;
            font-weight: 700;
          "
        >
          <span style="max-width: 240px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis"
            >Tighten the heading — fewer words, more confidence</span
          >
          <button
            style="
              width: 18px;
              height: 18px;
              border: 0;
              border-radius: 999px;
              padding: 0;
              background: #303745;
              color: #d8deea;
              line-height: 1;
              font-size: 14px;
              cursor: pointer;
            "
          >
            ×
          </button>
        </div>
        <div
          style="
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #3c4557;
            border-radius: 999px;
            background: #1c212b;
            color: #d8deea;
            padding: 5px 7px 5px 11px;
            font-size: 12px;
            font-weight: 700;
          "
        >
          <span>Make the CTA italic</span>
          <button
            style="
              width: 18px;
              height: 18px;
              border: 0;
              border-radius: 999px;
              padding: 0;
              background: #303745;
              color: #d8deea;
              line-height: 1;
              font-size: 14px;
              cursor: pointer;
            "
          >
            ×
          </button>
        </div>
        <div
          style="
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #3c4557;
            border-radius: 999px;
            background: #1c212b;
            color: #d8deea;
            padding: 5px 7px 5px 11px;
            font-size: 12px;
            font-weight: 700;
          "
        >
          <span>Move the footer below the diagram</span>
          <button
            style="
              width: 18px;
              height: 18px;
              border: 0;
              border-radius: 999px;
              padding: 0;
              background: #303745;
              color: #d8deea;
              line-height: 1;
              font-size: 14px;
              cursor: pointer;
            "
          >
            ×
          </button>
        </div>
      </div>
      <div class="mono" style="color: var(--fg-faint)">
        12px / 700 · pill radius · max-preview 220px ellipsised · ×&nbsp;chip is a smaller round button
      </div>
    </div>
  </body>
</html>
