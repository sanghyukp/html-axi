<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Iconography — words first, Lucide second</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start">
        <div>
          <div
            style="
              font-family: var(--font-serif);
              font-style: italic;
              font-size: 22px;
              line-height: 1.25;
              margin-bottom: 10px;
            "
          >
            In a literary product,<br />words are the iconography.
          </div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap">
            <button
              style="
                border: 0;
                border-radius: 10px;
                padding: 9px 12px;
                background: #2a2f3a;
                color: #f7f3ea;
                font: inherit;
                font-weight: 600;
              "
            >
              Annotate
            </button>
            <button
              style="
                border: 0;
                border-radius: 10px;
                padding: 9px 12px;
                background: #2a2f3a;
                color: #f7f3ea;
                font: inherit;
                font-weight: 600;
              "
            >
              Queue
            </button>
            <button
              style="
                border: 0;
                border-radius: 10px;
                padding: 9px 12px;
                background: #2a2f3a;
                color: #f7f3ea;
                font: inherit;
                font-weight: 600;
              "
            >
              Snapshot
            </button>
          </div>
        </div>
        <div>
          <div class="label" style="margin-bottom: 8px">When needed, Lucide</div>
          <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; color: #f7f3ea">
            <svg
              width="22"
              height="22"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              viewBox="0 0 24 24"
            >
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
            <svg
              width="22"
              height="22"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              viewBox="0 0 24 24"
            >
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <svg
              width="22"
              height="22"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              viewBox="0 0 24 24"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <path d="m9 11 3 3L22 4" />
            </svg>
            <svg
              width="22"
              height="22"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              viewBox="0 0 24 24"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M9 9h6v6H9z" />
            </svg>
            <svg
              width="22"
              height="22"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              viewBox="0 0 24 24"
            >
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          </div>
          <div class="mono" style="margin-top: 10px; color: var(--fg-faint)">
            1.5 stroke · round joins · 20–24 box · currentColor only
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
