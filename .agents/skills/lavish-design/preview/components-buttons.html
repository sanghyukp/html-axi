<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Buttons</div>
      <div class="row">
        <button
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: #f4c95d;
            color: #17130a;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
          "
        >
          Send to Agent
        </button>
        <button
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: #ffd877;
            color: #17130a;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
          "
        >
          hover
        </button>
        <button
          disabled
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: #f4c95d;
            color: #17130a;
            font: inherit;
            font-weight: 700;
            opacity: 0.55;
            cursor: not-allowed;
          "
        >
          disabled
        </button>
      </div>
      <div class="row">
        <button
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: #2a2f3a;
            color: #f7f3ea;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
          "
        >
          Annotation: On
        </button>
        <button
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: #303745;
            color: #f7f3ea;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
          "
        >
          hover
        </button>
        <button
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: transparent;
            color: #d8deea;
            font: inherit;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #303745;
          "
        >
          Cancel
        </button>
      </div>
      <div class="row">
        <button
          style="
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            background: #f06464;
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
          "
        >
          End Session
        </button>
      </div>
      <div class="mono" style="color: var(--fg-faint)">9–10 / 12–14 padding · radius 10 · no shadow</div>
    </div>
  </body>
</html>
