<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Ink — surfaces</div>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px">
        <div>
          <div style="height: 88px; background: #0f1115; border: 1px solid var(--border); border-radius: 12px"></div>
          <div style="margin-top: 6px">
            <div style="font-weight: 600">ink-900</div>
            <div class="mono">#0f1115</div>
          </div>
        </div>
        <div>
          <div style="height: 88px; background: #11141a; border: 1px solid var(--border); border-radius: 12px"></div>
          <div style="margin-top: 6px">
            <div style="font-weight: 600">ink-800</div>
            <div class="mono">#11141a</div>
          </div>
        </div>
        <div>
          <div style="height: 88px; background: #171a21; border: 1px solid var(--border); border-radius: 12px"></div>
          <div style="margin-top: 6px">
            <div style="font-weight: 600">ink-700</div>
            <div class="mono">#171a21</div>
          </div>
        </div>
        <div>
          <div style="height: 88px; background: #1c212b; border: 1px solid var(--border); border-radius: 12px"></div>
          <div style="margin-top: 6px">
            <div style="font-weight: 600">ink-600</div>
            <div class="mono">#1c212b</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
