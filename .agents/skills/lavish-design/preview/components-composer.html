<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Composer — Send aligned right</div>
      <div
        style="
          display: grid;
          gap: 8px;
          padding: 12px 16px;
          border: 1px solid var(--border-subtle);
          border-radius: 14px;
          background: var(--bg-panel);
          max-width: 520px;
        "
      >
        <textarea
          placeholder="Write a message for the agent…"
          rows="3"
          style="
            width: 100%;
            min-height: 82px;
            resize: vertical;
            border-radius: 12px;
            border: 1px solid #303745;
            background: #0f1115;
            color: #f7f3ea;
            padding: 10px;
            font: inherit;
            box-sizing: border-box;
          "
        ></textarea>
        <div style="display: flex; gap: 8px; justify-content: flex-end">
          <button
            style="
              border: 0;
              border-radius: 10px;
              padding: 9px 14px;
              background: #f4c95d;
              color: #17130a;
              font: inherit;
              font-weight: 700;
              cursor: pointer;
              white-space: nowrap;
            "
          >
            Send to Agent
          </button>
        </div>
      </div>
      <div class="mono" style="color: var(--fg-faint)">
        action row · justify-content: flex-end · radius 12 · min-height 82
      </div>
    </div>
  </body>
</html>
