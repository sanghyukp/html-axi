<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Type — scale</div>
      <div
        style="
          display: grid;
          grid-template-columns: 80px 1fr 120px;
          column-gap: 16px;
          row-gap: 6px;
          align-items: baseline;
        "
      >
        <div class="mono">48 / 1.1</div>
        <div style="font-family: var(--font-serif); font-size: 48px; line-height: 1.1">A well-edited line.</div>
        <div class="mono">h1 · serif</div>
        <div class="mono">28 / 1.25</div>
        <div style="font-size: 28px; line-height: 1.25; font-weight: 600">An honest section.</div>
        <div class="mono">h2 · sans</div>
        <div class="mono">18 / 1.45</div>
        <div style="font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--fg-muted)">
          A lede, set in serif italic.
        </div>
        <div class="mono">lede</div>
        <div class="mono">14 / 1.45</div>
        <div style="font-size: 14px">Body copy in Geist Sans, 14px / 1.45 — the product chrome default.</div>
        <div class="mono">body</div>
        <div class="mono">12 / 1.35</div>
        <div style="font-size: 12px; color: var(--fg-dim)">Helper. Captions. File paths in the bar.</div>
        <div class="mono">small</div>
        <div class="mono">10 / 1.4</div>
        <div
          style="
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--fg-label);
          "
        >
          EYEBROW
        </div>
        <div class="mono">eyebrow</div>
      </div>
    </div>
  </body>
</html>
