<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Radii — no 4px</div>
      <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; align-items: end">
        <div>
          <div
            style="height: 80px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px"
          ></div>
          <div class="mono" style="margin-top: 6px">8 · sm</div>
          <div style="font-size: 11px; color: var(--fg-dim)">chips, tooltips</div>
        </div>
        <div>
          <div
            style="height: 80px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px"
          ></div>
          <div class="mono" style="margin-top: 6px">10 · md</div>
          <div style="font-size: 11px; color: var(--fg-dim)">buttons</div>
        </div>
        <div>
          <div
            style="height: 80px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px"
          ></div>
          <div class="mono" style="margin-top: 6px">12 · lg</div>
          <div style="font-size: 11px; color: var(--fg-dim)">inputs</div>
        </div>
        <div>
          <div
            style="height: 80px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 14px"
          ></div>
          <div class="mono" style="margin-top: 6px">14 · xl</div>
          <div style="font-size: 11px; color: var(--fg-dim)">bubbles, cards</div>
        </div>
        <div>
          <div
            style="height: 80px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 999px"
          ></div>
          <div class="mono" style="margin-top: 6px">999 · pill</div>
          <div style="font-size: 11px; color: var(--fg-dim)">queued pills</div>
        </div>
      </div>
    </div>
  </body>
</html>
