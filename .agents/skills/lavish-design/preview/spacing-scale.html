<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Spacing — 8-pt grid</div>
      <div style="display: flex; align-items: flex-end; gap: 10px">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 2px; background: var(--brass-500)"></div>
          <div class="mono">2</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 4px; background: var(--brass-500)"></div>
          <div class="mono">4</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 6px; background: var(--brass-500)"></div>
          <div class="mono">6</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 8px; background: var(--brass-500)"></div>
          <div class="mono">8</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 12px; background: var(--brass-500)"></div>
          <div class="mono">12</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 16px; background: var(--brass-500)"></div>
          <div class="mono">16</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 24px; background: var(--brass-500)"></div>
          <div class="mono">24</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 32px; background: var(--brass-500)"></div>
          <div class="mono">32</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 48px; background: var(--brass-500)"></div>
          <div class="mono">48</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
          <div style="width: 36px; height: 64px; background: var(--brass-500)"></div>
          <div class="mono">64</div>
        </div>
      </div>
      <div style="font-family: var(--font-serif); font-style: italic; color: var(--fg-dim); max-width: 560px">
        8-pt grid with 4 and 2 half-steps. The chrome lives between 6 and 32.
      </div>
    </div>
  </body>
</html>
