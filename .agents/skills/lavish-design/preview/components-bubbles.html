<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Chat bubbles — alignment + shade</div>
      <div style="display: flex; flex-direction: column; gap: 10px; max-width: 520px">
        <div
          style="
            align-self: flex-end;
            max-width: 80%;
            border-radius: 14px;
            padding: 10px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
          "
        >
          <small
            style="
              display: block;
              color: var(--fg-faint);
              margin-bottom: 4px;
              font-size: 10px;
              font-weight: 700;
              letter-spacing: 0.08em;
              text-transform: uppercase;
              text-align: right;
            "
            >You</small
          >
          <div>Tighten the heading — fewer words, more confidence.</div>
        </div>
        <div
          style="
            align-self: flex-start;
            max-width: 80%;
            border-radius: 14px;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid var(--border-subtle);
          "
        >
          <small
            style="
              display: block;
              color: var(--fg-faint);
              margin-bottom: 4px;
              font-size: 10px;
              font-weight: 700;
              letter-spacing: 0.08em;
              text-transform: uppercase;
            "
            >Agent</small
          >
          <div>Done. I shortened it to "For when a rich editor is not rich enough."</div>
        </div>
        <div
          style="
            align-self: flex-start;
            max-width: 80%;
            border-radius: 14px;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--fg-muted);
          "
        >
          <span
            style="
              width: 14px;
              height: 14px;
              border-radius: 999px;
              border: 2px solid var(--steel-600);
              border-top-color: var(--accent);
              display: inline-block;
              animation: spin 0.8s linear infinite;
            "
          ></span>
          <span>Working…</span>
        </div>
      </div>
      <div class="mono" style="color: var(--fg-faint)">
        user · right-aligned · elevated shade &nbsp;·&nbsp; agent · left-aligned · sunken shade
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
  </body>
</html>
